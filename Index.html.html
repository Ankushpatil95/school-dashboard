<!DOCTYPE html>
<html>
<head>
    <title>School Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome (fixed version) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        .nav-link:hover { background-color: #495057; }
        .card:hover { transform: translateY(-5px); transition: 0.2s; }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">School Dashboard</span>
    </div>
</nav>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 bg-dark text-white min-vh-100 p-3">
        <ul class="nav flex-column">

            <!-- FIXED LINKS -->
            <li><a class="nav-link text-white" href="#"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a></li>
            <li><a class="nav-link text-white" href="#"><i class="fas fa-users me-2"></i>Students</a></li>
            <li><a class="nav-link text-white" href="#"><i class="fas fa-chalkboard-teacher me-2"></i>Teachers</a></li>
            <li><a class="nav-link text-white" href="#"><i class="fas fa-book me-2"></i>Classes</a></li>
            <li><a class="nav-link text-white" href="#"><i class="fas fa-pencil-alt me-2"></i>Exams</a></li>
            <li><a class="nav-link text-white" href="#"><i class="fas fa-cogs me-2"></i>Settings</a></li>

        </ul>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">
        <h2>Dashboard</h2>

        <!-- Cards -->
        <div class="row mt-4 g-3">
            <div class="col-md-3">
                <div class="card text-bg-primary p-3">
                    <h5>Total Students</h5>
                    <h3>400</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-bg-success p-3">
                    <h5>Total Teachers</h5>
                    <h3>30</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-bg-warning p-3">
                    <h5>Classes</h5>
                    <h3>20</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-bg-danger p-3">
                    <h5>Attendance</h5>
                    <h3>90%</h3>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card mt-5 shadow">
            <div class="card-body">
                <h5>Recent Students</h5>

                <!-- RESPONSIVE FIX -->
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Class</th>
                                <th>Attendance</th>
                                <th>Marks Scored</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Ankush Patil</td>
                                <td>10-A</td>
                                <td>90%</td>
                                <td>90</td>
                            </tr>
                            <tr>
                                <td>Aavishkar</td>
                                <td>9-B</td>
                                <td>85%</td>
                                <td>85</td>
                            </tr>
                            <tr>
                                <td>Kushagra</td>
                                <td>8-C</td>
                                <td>80%</td>
                                <td>90</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

    </div>
</div>
</div>

<!-- Bootstrap JS (IMPORTANT) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
